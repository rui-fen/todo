name: Frontend CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - "todo-fe/**"
  pull_request:
    paths:
      - "todo-fe/**"
  workflow_dispatch:

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: todo-fe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: todo-fe/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec eslint .

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Bump version and commit
        if: github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        run: |
          pnpm version patch --no-git-tag-version

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add package.json pnpm-lock.yaml

          git diff --cached --quiet || git commit -m "chore: bump version"

          git pull --rebase
          git push
