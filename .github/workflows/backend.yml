name: Backend CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - "todo-be/**"
  pull_request:
    paths:
      - "todo-be/**"
  workflow_dispatch:

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: todo-be
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: todo-be/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec eslint "src/**/*.ts" "test/**/*.ts"

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm exec jest --runInBand --watchman=false

      - name: E2E tests
        run: pnpm exec jest --runInBand --watchman=false --config ./test/jest-e2e.json

      - name: Build
        run: pnpm build

      - name: Bump version and commit
        if: github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        run: |
          pnpm version patch --no-git-tag-version

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add package.json pnpm-lock.yaml

          git diff --cached --quiet || git commit -m "chore: bump version"

          git pull --rebase
          git push

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/todo
            git pull origin main
            cd todo-be

            pnpm i
            pnpm build

            pm2 describe todo-backend > /dev/null 2>&1
              if [ $? -eq 0 ]; then
                pm2 restart todo-backend
              else
                pm2 start "pnpm nest start:prod" --name todo-backend
                pm2 save
                pm2 startup -u $USER --hp $HOME
              fi
